name: Deploy a Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: app

      - name: Build
        run: npm run build
        working-directory: app
        env:
          STRIPE_SECRET_KEY:              ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET:          ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRO_MONTHLY_PRICE_ID:    ${{ secrets.STRIPE_PRO_MONTHLY_PRICE_ID }}
          STRIPE_PRO_ANNUAL_PRICE_ID:     ${{ secrets.STRIPE_PRO_ANNUAL_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL:            https://quantumholistic.com
          N8N_PROFILE_WEBHOOK_URL:        ${{ secrets.N8N_PROFILE_WEBHOOK_URL }}
          N8N_STRIPE_WEBHOOK_URL:         ${{ secrets.N8N_STRIPE_WEBHOOK_URL }}

      - name: Deploy a Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: app
          vercel-args: '--prod'
